<div class="overlay" *ngIf="visible" (click)="onOverlayClick($event)" (keydown)="onKeydown($event)">
  <div class="dialog" role="dialog" aria-modal="true">
    <h2 class="dialog-title">{{ title }}</h2>
    <p class="dialog-subtitle">This action requires admin authentication.</p>

    <div class="input-group">
      <label for="pwd-input">Password</label>
      <div class="password-wrapper">
        <input
          id="pwd-input"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Enter password"
          (keydown)="onKeydown($event)"
          autocomplete="current-password"
        />
        <button type="button" class="toggle-btn" (click)="showPassword = !showPassword" tabindex="-1">
          {{ showPassword ? 'Hide' : 'Show' }}
        </button>
      </div>
      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
    </div>

    <div class="dialog-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="confirm()" [disabled]="!password">Confirm</button>
    </div>
  </div>
</div>
