<nav class="sidebar">
  <div class="sidebar-header">
    <div class="logo-container">
      <img
        *ngIf="adminService.settings().logoDataUrl"
        [src]="adminService.settings().logoDataUrl"
        alt="Center Logo"
        class="center-logo"
      />
      <div *ngIf="!adminService.settings().logoDataUrl" class="logo-placeholder">
        <span>&#127891;</span>
      </div>
    </div>
    <div class="center-name">
      {{ adminService.settings().centerName || 'Learning Center' }}
    </div>
    <div class="app-subtitle">Booklet Tracker</div>
  </div>

  <ul class="nav-links">
    <li>
      <a
        routerLink="/home"
        routerLinkActive="active"
        class="nav-link"
        title="Homepage"
      >
        <span class="nav-icon">&#127968;</span>
        <span class="nav-label">Homepage</span>
      </a>
    </li>
    <li>
      <a
        routerLink="/admin"
        routerLinkActive="active"
        class="nav-link"
        title="Admin Page"
      >
        <span class="nav-icon">&#9881;</span>
        <span class="nav-label">Admin Page</span>
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <div class="clock-panel">
      <div class="clock-day">{{ currentDay() }}</div>
      <div class="clock-date">{{ currentDate() }}</div>
      <div class="clock-time">{{ currentTime() }}</div>
    </div>
    <div class="footer-copy">Best Brains Learning Center &copy; {{ year }}</div>
  </div>
</nav>
